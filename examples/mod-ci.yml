# EXEMPLE — à COPIER dans le dépôt d'un mod (`.github/workflows/mod-ci.yml`).
#
# À chaque push sur la branche `deploy`, build le jar (Gradle ici ; adapte pour
# Maven) puis l'ajoute au draft recube OUVERT du couple (tenant, channel). Le CI
# ne fait QU'AJOUTER — create/publish/promote restent manuels (review humaine
# via le web).
#
# Pré-requis côté dépôt de mod (Settings → Secrets and variables → Actions) :
#   - Secret   RECUBE_TOKEN   = token de service rcs_… (scope launcher:draft, lié au tenant)
#   - Variable RECUBE_TENANT  = ex nationsglory
#   - Variable RECUBE_CHANNEL = ex beta
#
# Pas besoin d'ID de draft : le CLI cible le draft OUVERT de (tenant,channel)
# via l'endpoint /drafts/current (l'ID change à chaque cycle = ingérable).
#
# Cycle : un humain ouvre le draft (web/CLI `recube draft create`) → chaque push
# sur `deploy` d'un mod ajoute son jar au draft ouvert → l'humain review +
# publish quand tout est prêt.

name: mod-ci

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  build-and-add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build du jar (Gradle) ───────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8' # adapte à ta toolchain mod (1.6.4 = Java 8)

      - name: Build (gradle)
        run: ./gradlew build --no-daemon
        # Maven : remplace par `mvn -B package` et ajuste le glob du jar ci-dessous.

      # ── Ajout au draft ouvert (token de service, add-only) ──────────────
      - name: Ajouter le jar au draft recube
        uses: NationsGlory/RecubeCLI/.github/actions/recube-draft-add@main
        with:
          # Adapte le glob/chemin à ta sortie de build.
          glob: build/libs/*.jar
          tenant: ${{ vars.RECUBE_TENANT }}
          channel: ${{ vars.RECUBE_CHANNEL }}
          # draft-id omis → cible le draft ouvert de (tenant, channel).
          token: ${{ secrets.RECUBE_TOKEN }}
