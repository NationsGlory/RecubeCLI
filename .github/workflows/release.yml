# Build standalone recube binaries (Node SEA) for all platforms and attach them
# to the GitHub Release on a version tag (e.g. v0.3.0).
#
# install.sh / install.ps1 download from this release's assets:
#   recube-linux-x64, recube-linux-arm64, recube-macos-x64, recube-macos-arm64,
#   recube-windows-x64.exe   (+ a .sha256 sidecar each)
#
# No Node required on the user's machine — the binary IS a Node runtime with the
# bundled CLI injected as a SEA blob.

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag à (re)builder (ex: v0.3.0). Vide = HEAD sans upload.'
        required: false

permissions:
  contents: write # create/upload release assets

jobs:
  build:
    name: build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    # Borne le temps d'attente : un runner rare/saturé (ex macos-13 Intel) qui
    # reste QUEUED bloque sinon le job `release` (needs: build attend que TOUS
    # les jobs matrix terminent — un job queued à l'infini ne termine jamais).
    # À 20 min, le job échoue proprement → `needs` se résout → la release peut
    # publier les binaires des cibles qui ONT réussi (cf. release: continue).
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # linux-arm64 retiré : le runner `ubuntu-24.04-arm` n'est pas dispo sur
        # le plan → le job restait QUEUED indéfiniment et bloquait tout le job
        # `release` (needs: build attend TOUTE la matrice). Mieux vaut 4
        # binaires qui shippent que 5 bloqués. Pour rétablir arm64 plus tard :
        # soit un runner arm64 dispo, soit cross-compile QEMU.
        target:
          - { name: linux-x64,    os: ubuntu-latest,   asset: recube-linux-x64 }
          - { name: macos-x64,    os: macos-13,        asset: recube-macos-x64 }
          - { name: macos-arm64,  os: macos-14,        asset: recube-macos-arm64 }
          - { name: windows-x64,  os: windows-latest,  asset: recube-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build standalone binary
        run: npm run build:binary

      - name: Compute checksum (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist-bundle
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.target.asset }}" > "${{ matrix.target.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.target.asset }}" > "${{ matrix.target.asset }}.sha256"
          fi

      - name: Compute checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist-bundle
          $h = (Get-FileHash -Algorithm SHA256 -Path "${{ matrix.target.asset }}").Hash.ToLower()
          "$h  ${{ matrix.target.asset }}" | Out-File -Encoding ascii "${{ matrix.target.asset }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: |
            dist-bundle/${{ matrix.target.asset }}
            dist-bundle/${{ matrix.target.asset }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # `always()` : publie même si une cible matrix a échoué/timeout (runner rare)
    # — on ne bloque pas la release entière sur une seule plateforme starvée.
    # On exige quand même un tag v* ET qu'au moins UN binaire ait été produit
    # (vérifié plus bas). Une cible manquante = juste pas dans la release.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
        # Pas d'échec si certains artifacts manquent (cible buildée KO).
        continue-on-error: true

      - name: Flatten artifacts
        id: flatten
        run: |
          mkdir -p release
          find artifacts -type f -name 'recube-*' -exec cp {} release/ \; || true
          echo "Binaires récupérés :"
          ls -la release || true
          count=$(find release -type f -name 'recube-*' ! -name '*.sha256' | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "::error::Aucun binaire produit — toutes les cibles ont échoué." >&2
            exit 1
          fi
          echo "::notice::$count binaire(s) attaché(s) à la release."

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          # `false` : ne pas échouer si une cible manque (release partielle OK).
          fail_on_unmatched_files: false
          generate_release_notes: true
